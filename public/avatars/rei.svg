<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#080820"/><stop offset="100%" stop-color="#020208"/>
    </radialGradient>
    <clipPath id="c"><circle cx="100" cy="100" r="100"/></clipPath>
  </defs>
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>
  <g clip-path="url(#c)">
    <!-- Outfit - dark, elegant -->
    <path d="M30 220 Q50 170 75 162 L100 170 L125 162 Q150 170 170 220Z" fill="#1a1030"/>
    <rect x="86" y="152" width="28" height="26" rx="4" fill="#f0d0c0"/>
    <!-- Long straight hair back -->
    <path d="M48 95 Q42 145 45 215 L155 215 Q158 145 152 95 Q132 42 100 40 Q68 42 48 95Z" fill="#1a1428"/>
    <!-- Face -->
    <ellipse cx="100" cy="110" rx="50" ry="57" fill="#f0d0c0"/>
    <!-- Ears -->
    <ellipse cx="50" cy="113" rx="8" ry="10" fill="#f0d0c0"/><ellipse cx="50" cy="113" rx="5" ry="7" fill="#ecc4b0"/>
    <ellipse cx="150" cy="113" rx="8" ry="10" fill="#f0d0c0"/><ellipse cx="150" cy="113" rx="5" ry="7" fill="#ecc4b0"/>
    <!-- Hair front - straight, parted -->
    <path d="M48 95 Q50 65 66 52 Q82 41 100 40 Q118 41 134 52 Q150 65 152 95 Q136 60 100 59 Q64 60 48 95Z" fill="#1a1428"/>
    <!-- Straight bangs - parted slightly left of center -->
    <path d="M60 70 Q62 90 66 96 Q64 80 64 70Z" fill="#120e20"/>
    <path d="M72 56 Q70 76 72 86 Q76 68 74 55Z" fill="#120e20"/>
    <!-- Part - left heavy -->
    <path d="M86 46 Q83 68 86 78 Q89 60 87 45Z" fill="#120e20"/>
    <path d="M98 45 Q96 62 98 72 Q101 55 99 44Z" fill="#120e20"/>
    <!-- Right side shorter bangs -->
    <path d="M110 48 Q112 65 114 74 Q116 58 112 47Z" fill="#120e20"/>
    <path d="M124 56 Q128 72 128 82 Q130 68 126 55Z" fill="#120e20"/>
    <!-- Long side strands -->
    <path d="M48 95 Q44 130 46 175 Q52 135 54 95Z" fill="#1a1428"/>
    <path d="M152 95 Q156 130 154 175 Q148 135 146 95Z" fill="#1a1428"/>
    <!-- Eyebrows - elegant, slightly arched -->
    <path d="M68 92 Q80 88 92 91" stroke="#2a2040" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M108 91 Q120 88 132 92" stroke="#2a2040" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Eyes - half-lidded, mysterious -->
    <ellipse cx="80" cy="108" rx="13" ry="11" fill="#100818"/>
    <!-- Upper lid heavy -->
    <path d="M67 103 Q80 98 93 103 Q93 115 80 118 Q67 115 67 103Z" fill="#100818"/>
    <ellipse cx="80" cy="110" rx="10" ry="9" fill="#5028a0"/>
    <ellipse cx="80" cy="110" rx="7" ry="6.5" fill="#7840c8"/>
    <circle cx="80" cy="108" r="4.5" fill="#080410"/>
    <circle cx="75.5" cy="104.5" r="2.5" fill="white" opacity="0.9"/>
    <circle cx="82.5" cy="105.5" r="1.2" fill="white" opacity="0.6"/>
    <!-- Heavy upper lash -->
    <path d="M67 103 Q80 97 93 103" stroke="#100818" stroke-width="2.8" fill="none" stroke-linecap="round"/>
    <ellipse cx="120" cy="108" rx="13" ry="11" fill="#100818"/>
    <path d="M107 103 Q120 98 133 103 Q133 115 120 118 Q107 115 107 103Z" fill="#100818"/>
    <ellipse cx="120" cy="110" rx="10" ry="9" fill="#5028a0"/>
    <ellipse cx="120" cy="110" rx="7" ry="6.5" fill="#7840c8"/>
    <circle cx="120" cy="108" r="4.5" fill="#080410"/>
    <circle cx="115.5" cy="104.5" r="2.5" fill="white" opacity="0.9"/>
    <circle cx="122.5" cy="105.5" r="1.2" fill="white" opacity="0.6"/>
    <path d="M107 103 Q120 97 133 103" stroke="#100818" stroke-width="2.8" fill="none" stroke-linecap="round"/>
    <!-- Nose - refined -->
    <path d="M96 123 Q100 127 104 123" stroke="#c8a890" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <!-- Mouth - neutral, slightly parted -->
    <path d="M90 136 Q100 140 110 136" stroke="#c06870" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <!-- Moon pin accessory -->
    <path d="M130 62 A7 7 0 1 0 130 76 A5 5 0 1 1 130 62Z" fill="#c8a0e8"/>
    <!-- Star specks in background -->
    <circle cx="25" cy="30" r="1.5" fill="#8060c0" opacity="0.7"/>
    <circle cx="175" cy="45" r="1" fill="#8060c0" opacity="0.6"/>
    <circle cx="35" cy="155" r="1.2" fill="#8060c0" opacity="0.5"/>
  </g>
</svg>
