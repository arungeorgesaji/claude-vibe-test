<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#042820"/><stop offset="100%" stop-color="#011008"/>
    </radialGradient>
    <clipPath id="c"><circle cx="100" cy="100" r="100"/></clipPath>
  </defs>
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>
  <g clip-path="url(#c)">
    <!-- Outfit - elegant -->
    <path d="M30 220 Q50 168 75 160 L100 168 L125 160 Q150 168 170 220Z" fill="#184838"/>
    <rect x="86" y="150" width="28" height="28" rx="4" fill="#f2d8c0"/>
    <!-- Hair back - flowing, one side over shoulder -->
    <path d="M50 92 Q44 140 48 215 L152 215 Q156 140 150 92 Q130 46 100 44 Q70 46 50 92Z" fill="#188870"/>
