    <path d="M68 56 Q67 74 70 82 Q72 67 70 55Z" fill="#108860"/>
    <path d="M84 47 Q83 65 86 73 Q88 58 86 46Z" fill="#108860"/>
    <!-- Part sweeps to right -->
    <path d="M100 46 Q102 58 108 72 Q104 60 102 45Z" fill="#108860"/>
    <path d="M112 50 Q116 66 118 76 Q114 63 112 49Z" fill="#108860"/>
    <path d="M126 58 Q130 74 132 84 Q128 70 126 57Z" fill="#108860"/>
    <!-- Eyebrows - elegant, well-shaped -->
    <path d="M68 91 Q81 86 93 89" stroke="#0a5038" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M107 89 Q119 86 132 91" stroke="#0a5038" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Eyes - mature, almond-shaped, elegant -->
    <ellipse cx="80" cy="107" rx="14" ry="12" fill="#081810"/>
    <ellipse cx="80" cy="108" rx="11" ry="9" fill="#1a7858"/>
    <ellipse cx="80" cy="108" rx="8" ry="7" fill="#28a876"/>
    <circle cx="80" cy="106" r="4.5" fill="#040e08"/>
    <circle cx="75" cy="102.5" r="2.5" fill="white" opacity="0.92"/>
    <circle cx="82" cy="103.5" r="1.2" fill="white" opacity="0.65"/>
    <path d="M66 100 Q80 95 94 100" stroke="#081810" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <!-- Slight lower lash line -->
    <path d="M67 114 Q80 118 93 114" stroke="#081810" stroke-width="1" fill="none" stroke-linecap="round"/>
    <ellipse cx="120" cy="107" rx="14" ry="12" fill="#081810"/>
    <ellipse cx="120" cy="108" rx="11" ry="9" fill="#1a7858"/>
    <ellipse cx="120" cy="108" rx="8" ry="7" fill="#28a876"/>
    <circle cx="120" cy="106" r="4.5" fill="#040e08"/>
    <circle cx="115" cy="102.5" r="2.5" fill="white" opacity="0.92"/>
    <circle cx="122" cy="103.5" r="1.2" fill="white" opacity="0.65"/>
    <path d="M106 100 Q120 95 134 100" stroke="#081810" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <path d="M107 114 Q120 118 133 114" stroke="#081810" stroke-width="1" fill="none" stroke-linecap="round"/>
    <!-- Very subtle blush - mature, not heavy -->
    <ellipse cx="67" cy="118" rx="10" ry="4" fill="#e09070" opacity="0.18"/>
    <ellipse cx="133" cy="118" rx="10" ry="4" fill="#e09070" opacity="0.18"/>
    <!-- Nose - refined -->
    <path d="M96 122 Q100 126 104 122" stroke="#c8a080" stroke-width="1.3" fill="none" stroke-linecap="round"/>
    <!-- Smile - composed, warm but knowing -->
    <path d="M88 134 Q100 143 112 134" stroke="#c86870" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Hair accessory - elegant pin -->
    <line x1="130" y1="62" x2="142" y2="68" stroke="#40c8a0" stroke-width="2"/>
    <circle cx="142" cy="68" r="4" fill="#40c8a0"/>
    <circle cx="142" cy="68" r="2" fill="#80e8c0"/>
