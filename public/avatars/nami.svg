    <ellipse cx="100" cy="110" rx="50" ry="56" fill="#f2d8c0"/>
    <!-- Ears -->
    <ellipse cx="50" cy="112" rx="8" ry="10" fill="#f2d8c0"/><ellipse cx="50" cy="112" rx="5" ry="7" fill="#eecab0"/>
    <ellipse cx="150" cy="112" rx="8" ry="10" fill="#f2d8c0"/><ellipse cx="150" cy="112" rx="5" ry="7" fill="#eecab0"/>
    <!-- Earring left -->
    <circle cx="42" cy="120" r="3" fill="#40c8a0"/>
    <line x1="42" y1="123" x2="42" y2="130" stroke="#40c8a0" stroke-width="1.5"/>
