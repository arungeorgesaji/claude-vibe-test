    <circle cx="42" cy="110" r="6" fill="#304888"/>
    <circle cx="42" cy="110" r="3" fill="#40a0ff" opacity="0.7"/>
    <path d="M158 108 Q162 90 155 76 Q150 68 142 72" stroke="#304880" stroke-width="6" fill="none" stroke-linecap="round"/>
