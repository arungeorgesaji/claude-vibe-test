    <path d="M107 104 Q120 100 133 104" stroke="#080c18" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Nose -->
    <path d="M96 123 Q100 127 104 123" stroke="#c89878" stroke-width="1.3" fill="none" stroke-linecap="round"/>
    <!-- Cocky grin -->
    <path d="M87 134 Q94 138 106 135" stroke="#c06858" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <path d="M87 134 Q86 137 89 139" stroke="#c06858" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M106 135 Q108 133 110 135" stroke="#c06858" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Electric glow accent -->
    <circle cx="165" cy="60" r="3" fill="#40a0ff" opacity="0.5"/>
    <circle cx="35" cy="75" r="2" fill="#40a0ff" opacity="0.4"/>
