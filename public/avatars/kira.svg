    <ellipse cx="80" cy="108" rx="10" ry="10" fill="#107820"/>
    <ellipse cx="80" cy="108" rx="7" ry="7" fill="#20c040"/>
    <circle cx="80" cy="106" r="4.5" fill="#040810"/>
    <circle cx="75.5" cy="102.5" r="2.5" fill="white" opacity="0.9"/>
    <circle cx="82.5" cy="103.5" r="1.2" fill="white" opacity="0.65"/>
    <path d="M67 100 Q80 95 93 100" stroke="#080c18" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <!-- Right eye - slightly squinted/smug -->
    <ellipse cx="120" cy="108" rx="13" ry="11" fill="#080c18"/>
    <ellipse cx="120" cy="109" rx="10" ry="8.5" fill="#107820"/>
    <ellipse cx="120" cy="109" rx="7" ry="6" fill="#20c040"/>
    <circle cx="120" cy="107" r="4" fill="#040810"/>
    <circle cx="115.5" cy="103.5" r="2.5" fill="white" opacity="0.9"/>
    <circle cx="122.5" cy="104.5" r="1.2" fill="white" opacity="0.65"/>
    <path d="M107 101 Q120 97 133 101" stroke="#080c18" stroke-width="2.5" fill="none" stroke-linecap="round"/>
