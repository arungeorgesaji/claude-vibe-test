<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#2a0a28"/><stop offset="100%" stop-color="#100610"/>
    </radialGradient>
    <clipPath id="c"><circle cx="100" cy="100" r="100"/></clipPath>
  </defs>
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>
  <g clip-path="url(#c)">
    <!-- Outfit - sweet/cute, white with pink -->
    <path d="M30 220 Q50 170 75 162 L100 170 L125 162 Q150 170 170 220Z" fill="#f0d0e8"/>
    <path d="M85 163 L100 172 L115 163 Q100 170 85 163Z" fill="#e0b0d0"/>
    <rect x="86" y="150" width="28" height="26" rx="4" fill="#fce8f0"/>
