    <path d="M48 96 Q42 148 50 215 L150 215 Q158 148 152 96 Q132 44 100 42 Q68 44 48 96Z" fill="#f4a0c8"/>
    <!-- Side volume -->
    <path d="M48 96 Q38 120 36 165 Q44 135 50 108Z" fill="#ec88b8"/>
    <path d="M152 96 Q162 120 164 165 Q156 135 150 108Z" fill="#ec88b8"/>
    <!-- Face -->
    <ellipse cx="100" cy="110" rx="50" ry="57" fill="#fce8f0"/>
    <!-- Ears -->
    <ellipse cx="50" cy="113" rx="8" ry="10" fill="#fce8f0"/><ellipse cx="50" cy="113" rx="5" ry="7" fill="#f8d8e8"/>
    <ellipse cx="150" cy="113" rx="8" ry="10" fill="#fce8f0"/><ellipse cx="150" cy="113" rx="5" ry="7" fill="#f8d8e8"/>
    <!-- Hair front - cute, slightly messy fringe -->
    <path d="M48 96 Q52 66 68 54 Q84 43 100 42 Q116 43 132 54 Q148 66 152 96 Q135 64 100 63 Q65 64 48 96Z" fill="#f4a0c8"/>
    <path d="M58 72 Q60 91 64 97 Q62 80 62 71Z" fill="#e888b8"/>
    <path d="M72 57 Q70 76 73 83 Q75 68 73 56Z" fill="#e888b8"/>
    <path d="M88 47 Q86 66 88 74 Q91 59 89 46Z" fill="#e888b8"/>
    <path d="M102 45 Q101 63 103 71 Q105 57 103 44Z" fill="#e888b8"/>
    <path d="M116 49 Q118 67 116 75 Q114 61 116 48Z" fill="#e888b8"/>
    <path d="M130 59 Q133 77 134 85 Q132 72 130 58Z" fill="#e888b8"/>
    <path d="M140 70 Q143 87 145 93 Q143 80 141 69Z" fill="#e888b8"/>
    <!-- Hair accessories - two small clips -->
    <rect x="76" y="60" width="10" height="5" rx="2.5" fill="#e040a0"/>
    <rect x="114" y="62" width="10" height="5" rx="2.5" fill="#e040a0"/>
    <!-- Eyebrows - soft, curved, innocent-looking -->
    <path d="M68 92 Q80 88 92 91" stroke="#b06080" stroke-width="2.3" fill="none" stroke-linecap="round"/>
    <path d="M108 91 Q120 88 132 92" stroke="#b06080" stroke-width="2.3" fill="none" stroke-linecap="round"/>
    <!-- Eyes - big, sweet-looking but with something slightly vacant/intense -->
    <!-- Left eye -->
    <ellipse cx="80" cy="108" rx="15" ry="16" fill="#120a18"/>
    <ellipse cx="80" cy="109" rx="12" ry="13" fill="#8010a0"/>
    <ellipse cx="80" cy="109" rx="9" ry="10" fill="#c030d8"/>
    <circle cx="80" cy="107" r="5" fill="#0a060e"/>
    <!-- Multiple highlights for that slightly eerie glassy look -->
    <circle cx="74.5" cy="102.5" r="3" fill="white" opacity="0.95"/>
    <circle cx="83" cy="103.5" r="1.8" fill="white" opacity="0.8"/>
    <circle cx="85.5" cy="109" r="1" fill="white" opacity="0.5"/>
    <circle cx="75" cy="111" r="1" fill="white" opacity="0.4"/>
    <path d="M65 101 Q80 95 95 101" stroke="#120a18" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Right eye -->
    <ellipse cx="120" cy="108" rx="15" ry="16" fill="#120a18"/>
    <ellipse cx="120" cy="109" rx="12" ry="13" fill="#8010a0"/>
    <ellipse cx="120" cy="109" rx="9" ry="10" fill="#c030d8"/>
    <circle cx="120" cy="107" r="5" fill="#0a060e"/>
    <circle cx="114.5" cy="102.5" r="3" fill="white" opacity="0.95"/>
    <circle cx="123" cy="103.5" r="1.8" fill="white" opacity="0.8"/>
    <circle cx="125.5" cy="109" r="1" fill="white" opacity="0.5"/>
    <circle cx="115" cy="111" r="1" fill="white" opacity="0.4"/>
    <path d="M105 101 Q120 95 135 101" stroke="#120a18" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Soft blush - very pink/sweet -->
    <ellipse cx="65" cy="122" rx="13" ry="6" fill="#f060a0" opacity="0.32"/>
    <ellipse cx="135" cy="122" rx="13" ry="6" fill="#f060a0" opacity="0.32"/>
    <!-- Blush dots -->
    <circle cx="60" cy="121" r="1.5" fill="#f060a0" opacity="0.45"/>
    <circle cx="63.5" cy="125" r="1" fill="#f060a0" opacity="0.35"/>
    <circle cx="140" cy="121" r="1.5" fill="#f060a0" opacity="0.45"/>
    <circle cx="136.5" cy="125" r="1" fill="#f060a0" opacity="0.35"/>
    <!-- Nose -->
    <path d="M96 124 Q100 128 104 124" stroke="#d898b8" stroke-width="1.3" fill="none" stroke-linecap="round"/>
    <!-- Smile - sweet but slightly too wide/fixed -->
    <path d="M86 136 Q100 148 114 136" stroke="#d84888" stroke-width="2.2" fill="none" stroke-linecap="round"/>
    <path d="M88 137 Q100 147 112 137 Q100 146 88 137Z" fill="#f890b8" opacity="0.3"/>
    <!-- Subtle dark circles under eyes - hint of something darker -->
    <ellipse cx="80" cy="121" rx="12" ry="3" fill="#8828a0" opacity="0.08"/>
    <ellipse cx="120" cy="121" rx="12" ry="3" fill="#8828a0" opacity="0.08"/>
    <!-- Small heart detail -->
    <path d="M97 155 Q100 152 103 155 Q106 158 100 162 Q94 158 97 155Z" fill="#e040a0" opacity="0.7"/>
