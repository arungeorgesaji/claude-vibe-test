<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1235"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </radialGradient>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#f0abfc"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="url(#bg)"/>

  <!-- Crescent moon -->
  <path d="M20.5 8.5 A9 9 0 1 0 20.5 23.5 A6 6 0 1 1 20.5 8.5 Z"
        fill="url(#grad)" filter="url(#glow)"/>

  <!-- Small sparkle star top-right -->
  <g fill="#f0abfc" filter="url(#glow)">
    <polygon points="23,7 23.5,8.5 25,9 23.5,9.5 23,11 22.5,9.5 21,9 22.5,8.5"
             opacity="0.95"/>
  </g>
</svg>
