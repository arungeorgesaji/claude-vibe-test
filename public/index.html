<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Companion</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d1a;
      --surface: #13132a;
      --surface2: #1a1a35;
      --border: rgba(180, 140, 255, 0.12);
      --accent: #c084fc;
      --accent2: #f0abfc;
      --accent-glow: rgba(192, 132, 252, 0.25);
      --text: #f0e8ff;
      --text-muted: #9d8fbf;
      --scrollbar: #3d2b6b;

      /* dynamic — overridden per character */
      --char-from: #7c3aed;
      --char-to: #c084fc;
    }

    html, body { height: 100%; font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 30% 70%, rgba(255,255,255,0.35) 0%, transparent 100%),
        radial-gradient(1px 1px at 50% 10%, rgba(255,255,255,0.45) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 50%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 80%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 15% 90%, rgba(255,255,255,0.35) 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 35%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 15%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 40% 60%, rgba(192,132,252,0.55) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 75% 40%, rgba(240,171,252,0.45) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 600px 400px at 20% 80%, rgba(109,40,217,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 500px 300px at 80% 20%, rgba(147,51,234,0.05) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ======================== SELECT SCREEN ======================== */

    #select-screen {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      gap: 32px;
    }

    .select-header { text-align: center; }
    .select-header h1 { font-size: 28px; font-weight: 700; color: var(--text); letter-spacing: -0.01em; }
    .select-header p { font-size: 14px; color: var(--text-muted); margin-top: 6px; }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      width: 100%;
      max-width: 900px;
    }

    .char-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 0 0 20px;
      cursor: pointer;
      text-align: center;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .char-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--card-from), var(--card-to));
      opacity: 0;
      transition: opacity 0.2s ease;
      border-radius: inherit;
    }

    .char-card:hover { transform: translateY(-4px); }
    .char-card:hover::before { opacity: 0.07; }
    .char-card:hover { border-color: var(--card-to); box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 20px color-mix(in srgb, var(--card-to) 20%, transparent); }

    .card-avatar-wrap {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 18px 18px 0 0;
      overflow: hidden;
      position: relative;
      z-index: 1;
      background: linear-gradient(160deg, var(--card-from), var(--card-to));
    }

    .card-avatar-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .card-body { padding: 14px 16px 0; position: relative; z-index: 1; }
    .card-name { font-size: 17px; font-weight: 700; margin-bottom: 3px; }
    .card-tagline { font-size: 11px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 8px; opacity: 0.7; background: linear-gradient(90deg, var(--card-from), var(--card-to)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .card-desc { font-size: 12.5px; color: var(--text-muted); line-height: 1.5; }

    /* ======================== CHAT SCREEN ======================== */

    #chat-screen {
      display: none;
      position: relative;
      z-index: 1;
      flex-direction: column;
      height: 100vh;
      max-width: 820px;
      margin: 0 auto;
    }

    #chat-screen.active { display: flex; }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
      background: rgba(13,13,26,0.75);
      flex-shrink: 0;
    }

    .back-btn {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .back-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }

    .avatar-wrap { position: relative; flex-shrink: 0; }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--char-from), var(--char-to));
      overflow: hidden;
      box-shadow: 0 0 16px color-mix(in srgb, var(--char-to) 40%, transparent);
    }

    .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .online-dot {
      position: absolute;
      bottom: 1px;
      right: 1px;
      width: 10px;
      height: 10px;
      background: #4ade80;
      border-radius: 50%;
      border: 2px solid var(--bg);
      box-shadow: 0 0 5px rgba(74,222,128,0.6);
    }

    .header-info h1 { font-size: 16px; font-weight: 700; }
    .header-info p { font-size: 11.5px; color: var(--text-muted); }
    .header-info p span { color: #4ade80; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 20px 8px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 99px; }

    .welcome {
      text-align: center;
      padding: 28px 16px;
      color: var(--text-muted);
    }

    .welcome-avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      overflow: hidden;
      margin: 0 auto 14px;
      box-shadow: 0 0 24px color-mix(in srgb, var(--char-to) 40%, transparent), 0 0 48px color-mix(in srgb, var(--char-to) 15%, transparent);
      border: 2px solid color-mix(in srgb, var(--char-to) 40%, transparent);
    }

    .welcome-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .welcome h2 { font-size: 18px; color: var(--text); margin-bottom: 5px; font-weight: 700; }
    .welcome p { font-size: 13.5px; line-height: 1.6; }

    .welcome-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 18px;
    }

    .chip {
      padding: 6px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 99px;
      font-size: 12.5px;
      color: var(--accent);
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .chip:hover {
      background: color-mix(in srgb, var(--char-to) 12%, transparent);
      border-color: color-mix(in srgb, var(--char-to) 40%, transparent);
      transform: translateY(-1px);
      color: var(--char-to);
    }

    .message {
      display: flex;
      gap: 9px;
      max-width: 84%;
      animation: fadeUp 0.22s ease-out;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(7px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user { align-self: flex-end; flex-direction: row-reverse; }
    .message.char { align-self: flex-start; }

    .msg-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      margin-top: 2px;
    }

    .message.char .msg-avatar {
      background: linear-gradient(135deg, var(--char-from), var(--char-to));
      box-shadow: 0 0 10px color-mix(in srgb, var(--char-to) 35%, transparent);
      overflow: hidden;
    }

    .message.char .msg-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .message.user .msg-avatar { background: linear-gradient(135deg, #1e1b4b, #4c1d95); }

    .bubble {
      padding: 10px 15px;
      border-radius: 16px;
      line-height: 1.65;
      font-size: 14px;
    }

    .message.char .bubble {
      background: #1e1e3f;
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
    }

    .message.user .bubble {
      background: linear-gradient(135deg, var(--char-from), color-mix(in srgb, var(--char-to) 80%, var(--char-from)));
      border-top-right-radius: 4px;
      color: white;
      box-shadow: 0 2px 10px color-mix(in srgb, var(--char-from) 40%, transparent);
    }

    .typing-indicator {
      display: flex;
      gap: 5px;
      padding: 13px 15px;
      align-items: center;
    }

    .typing-indicator span {
      width: 6px;
      height: 6px;
      background: var(--char-to);
      border-radius: 50%;
      display: inline-block;
      animation: bounce 1.2s infinite ease-in-out;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
      40% { transform: scale(1.1); opacity: 1; }
    }

    .input-area {
      padding: 14px 20px 18px;
      border-top: 1px solid var(--border);
      backdrop-filter: blur(12px);
      background: rgba(13,13,26,0.75);
      flex-shrink: 0;
    }

    .input-row { display: flex; gap: 9px; align-items: flex-end; }

    #input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 13px;
      padding: 11px 15px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      resize: none;
      outline: none;
      max-height: 120px;
      line-height: 1.5;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #input::placeholder { color: var(--text-muted); }

    #input:focus {
      border-color: color-mix(in srgb, var(--char-to) 40%, transparent);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--char-to) 8%, transparent);
    }

    #send-btn {
      width: 42px;
      height: 42px;
      border-radius: 11px;
      background: linear-gradient(135deg, var(--char-from), var(--char-to));
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      box-shadow: 0 2px 10px color-mix(in srgb, var(--char-from) 50%, transparent);
    }

    #send-btn:hover:not(:disabled) { transform: translateY(-1px); }
    #send-btn:active:not(:disabled) { transform: scale(0.95); }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    #send-btn svg { width: 17px; height: 17px; fill: white; }

    .hint { font-size: 11px; color: var(--text-muted); text-align: center; margin-top: 7px; }
    .bubble em { color: var(--accent2); font-style: italic; font-weight: 500; }
  </style>
</head>
<body>

  <!-- CHARACTER SELECT -->
  <div id="select-screen">
    <div class="select-header">
      <h1>Choose your companion</h1>
      <p>Each has their own personality, vibe, and way of connecting with you.</p>
    </div>
    <div class="cards-grid" id="cards-grid">
      <div style="color:var(--text-muted);font-size:13px;grid-column:1/-1;text-align:center;padding:20px">Loading...</div>
    </div>
  </div>

  <!-- CHAT -->
  <div id="chat-screen">
    <header>
      <button class="back-btn" onclick="goBack()" title="Choose another companion">←</button>
      <div class="avatar-wrap">
        <div class="avatar" id="chat-avatar"></div>
        <div class="online-dot"></div>
      </div>
      <div class="header-info">
        <h1 id="chat-name"></h1>
        <p><span>online</span></p>
      </div>
    </header>

    <div id="messages"></div>

    <div class="input-area">
      <div class="input-row">
        <textarea id="input" rows="1" placeholder="Say something..." maxlength="1000"></textarea>
        <button id="send-btn" onclick="sendMessage()" aria-label="Send">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
      <p class="hint">Enter to send · Shift+Enter for new line</p>
    </div>
  </div>

  <script>
    let personalities = [];
    let currentPersonality = null;
    let history = [];
    let isStreaming = false;

    const selectScreen = document.getElementById('select-screen');
    const chatScreen = document.getElementById('chat-screen');
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send-btn');
    const chatAvatar = document.getElementById('chat-avatar');
    const chatName = document.getElementById('chat-name');
    const cardsGrid = document.getElementById('cards-grid');

    async function init() {
      const res = await fetch('/api/personalities');
      personalities = await res.json();
      renderCards();
    }

    function renderCards() {
      cardsGrid.innerHTML = personalities.map(p => `
        <div class="char-card" onclick="selectCharacter('${p.id}')"
          style="--card-from:${p.accentFrom};--card-to:${p.accentTo}">
          <div class="card-avatar-wrap">
            <img src="${p.avatar}" alt="${p.name}" loading="lazy"/>
          </div>
          <div class="card-body">
            <div class="card-name">${p.name}</div>
            <div class="card-tagline">${p.tagline}</div>
            <div class="card-desc">${p.description}</div>
          </div>
        </div>
      `).join('');
    }

    function selectCharacter(id) {
      currentPersonality = personalities.find(p => p.id === id);
      history = [];

      document.documentElement.style.setProperty('--char-from', currentPersonality.accentFrom);
      document.documentElement.style.setProperty('--char-to', currentPersonality.accentTo);

      chatAvatar.innerHTML = `<img src="${currentPersonality.avatar}" alt="${currentPersonality.name}"/>`;
      chatName.textContent = currentPersonality.name;
      inputEl.placeholder = `Say something to ${currentPersonality.name}...`;

      messagesEl.innerHTML = `
        <div class="welcome" id="welcome">
          <div class="welcome-avatar">
            <img src="${currentPersonality.avatar}" alt="${currentPersonality.name}"/>
          </div>
          <h2>${currentPersonality.name}</h2>
          <p>${currentPersonality.description}</p>
          <div class="welcome-chips" id="chips"></div>
        </div>
      `;

      const chips = getChips(id);
      document.getElementById('chips').innerHTML = chips.map(c =>
        `<button class="chip" onclick="sendChip(this)">${c}</button>`
      ).join('');

      selectScreen.style.display = 'none';
      chatScreen.classList.add('active');
      inputEl.focus();
    }

    function getChips(id) {
      const defaults = ['Hey there~', "How's your day?", 'Tell me about yourself', "I'm a bit lonely..."];
      const map = {
        yuki:  ["Hey Yuki~", "What are you thinking about?", "I had a rough day...", "Tell me something sweet"],
        akane: ["Hey gorgeous", "I've been thinking about you...", "Flirt with me", "Let's get a little wild"],
        hana:  ["Hey!", "Did you miss me?", "You're cute when you're flustered", "Admit you like me"],
        rei:   ["Hello, Rei.", "What are you thinking?", "Tell me something dark", "Are you lonely?"],
      };
      return map[id] || defaults;
    }

    function goBack() {
      chatScreen.classList.remove('active');
      selectScreen.style.display = '';
    }

    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
    });

    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (!isStreaming) sendMessage();
      }
    });

    function sendChip(btn) {
      inputEl.value = btn.textContent;
      sendMessage();
    }

    function appendMessage(role, content) {
      const div = document.createElement('div');
      div.className = `message ${role === 'user' ? 'user' : 'char'}`;

      const avatarDiv = document.createElement('div');
      avatarDiv.className = 'msg-avatar';
      avatarDiv.textContent = role === 'user' ? '🫧' : currentPersonality.emoji;

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      setContent(bubble, content);

      div.appendChild(avatarDiv);
      div.appendChild(bubble);
      messagesEl.appendChild(div);
      scrollDown();
      return bubble;
    }

    function setContent(el, text) {
      el.innerHTML = text
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/\*(.*?)\*/g, '<em>$1</em>')
        .replace(/\n/g, '<br>');
    }

    function addTypingIndicator() {
      const div = document.createElement('div');
      div.className = 'message char';
      div.id = 'typing';

      const av = document.createElement('div');
      av.className = 'msg-avatar';
      av.innerHTML = `<img src="${currentPersonality.avatar}" alt="${currentPersonality.name}"/>`;

      const bubble = document.createElement('div');
      bubble.className = 'bubble typing-indicator';
      bubble.innerHTML = '<span></span><span></span><span></span>';

      div.appendChild(av);
      div.appendChild(bubble);
      messagesEl.appendChild(div);
      scrollDown();
      return div;
    }

    function scrollDown() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || isStreaming || !currentPersonality) return;

      document.getElementById('welcome')?.remove();
      inputEl.value = '';
      inputEl.style.height = 'auto';
      isStreaming = true;
      sendBtn.disabled = true;

      history.push({ role: 'user', content: text });
      appendMessage('user', text);
      const typingEl = addTypingIndicator();

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: history, personalityId: currentPersonality.id }),
        });

        typingEl.remove();
        if (!res.ok) throw new Error('Server error');

        const bubble = appendMessage('char', '');
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let accumulated = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          const chunk = decoder.decode(value, { stream: true });
          for (const line of chunk.split('\n')) {
            if (!line.startsWith('data: ')) continue;
            const data = line.slice(6);
            if (data === '[DONE]') break;
            try {
              const parsed = JSON.parse(data);
              if (parsed.content) { accumulated += parsed.content; setContent(bubble, accumulated); scrollDown(); }
              if (parsed.error) accumulated = parsed.error;
            } catch {}
          }
        }

        history.push({ role: 'assistant', content: accumulated });
      } catch {
        typingEl?.remove();
        appendMessage('char', '*pauses* Something went wrong... try again?');
      }

      isStreaming = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }

    init();
  </script>
</body>
</html>
