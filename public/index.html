<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yuki — Your AI Companion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d1a;
      --surface: #13132a;
      --surface2: #1a1a35;
      --border: rgba(180, 140, 255, 0.12);
      --accent: #c084fc;
      --accent2: #f0abfc;
      --accent-glow: rgba(192, 132, 252, 0.25);
      --text: #f0e8ff;
      --text-muted: #9d8fbf;
      --user-bubble: linear-gradient(135deg, #6d28d9, #9333ea);
      --yuki-bubble: #1e1e3f;
      --input-bg: #1a1a35;
      --scrollbar: #3d2b6b;
    }

    html, body {
      height: 100%;
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* Animated starfield background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 30% 70%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 50% 10%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 50%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 80%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 15% 90%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 35%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 15%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 40% 60%, rgba(192,132,252,0.6) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 75% 40%, rgba(240,171,252,0.5) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* Nebula glow blobs */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 600px 400px at 20% 80%, rgba(109,40,217,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 500px 300px at 80% 20%, rgba(147,51,234,0.06) 0%, transparent 70%),
        radial-gradient(ellipse 400px 600px at 50% 50%, rgba(192,132,252,0.04) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    #app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 820px;
      margin: 0 auto;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 24px 16px;
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
      background: rgba(13,13,26,0.7);
      flex-shrink: 0;
    }

    .avatar-wrap {
      position: relative;
      flex-shrink: 0;
    }

    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7c3aed, #c084fc, #f0abfc);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      box-shadow: 0 0 20px var(--accent-glow), 0 0 40px rgba(192,132,252,0.1);
    }

    .online-dot {
      position: absolute;
      bottom: 2px;
      right: 2px;
      width: 11px;
      height: 11px;
      background: #4ade80;
      border-radius: 50%;
      border: 2px solid var(--bg);
      box-shadow: 0 0 6px rgba(74,222,128,0.6);
    }

    .header-info h1 {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.01em;
    }

    .header-info p {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 400;
    }

    .header-info p span {
      color: #4ade80;
    }

    /* Messages area */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 24px 8px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 99px; }

    /* Welcome message */
    .welcome {
      text-align: center;
      padding: 32px 16px;
      color: var(--text-muted);
    }

    .welcome-emoji {
      font-size: 48px;
      display: block;
      margin-bottom: 12px;
      filter: drop-shadow(0 0 16px rgba(192,132,252,0.5));
    }

    .welcome h2 {
      font-size: 20px;
      color: var(--accent2);
      margin-bottom: 6px;
      font-weight: 700;
    }

    .welcome p {
      font-size: 14px;
      line-height: 1.6;
    }

    .welcome-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 20px;
    }

    .chip {
      padding: 7px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 99px;
      font-size: 13px;
      color: var(--accent);
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
    }

    .chip:hover {
      background: rgba(192,132,252,0.12);
      border-color: rgba(192,132,252,0.4);
      transform: translateY(-1px);
    }

    /* Message bubbles */
    .message {
      display: flex;
      gap: 10px;
      max-width: 85%;
      animation: fadeUp 0.25s ease-out;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .message.yuki {
      align-self: flex-start;
    }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      margin-top: 2px;
    }

    .message.yuki .msg-avatar {
      background: linear-gradient(135deg, #7c3aed, #c084fc);
      box-shadow: 0 0 12px var(--accent-glow);
    }

    .message.user .msg-avatar {
      background: linear-gradient(135deg, #1e1b4b, #4c1d95);
    }

    .bubble {
      padding: 11px 16px;
      border-radius: 18px;
      line-height: 1.65;
      font-size: 14.5px;
      font-weight: 400;
    }

    .message.yuki .bubble {
      background: var(--yuki-bubble);
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
      color: var(--text);
    }

    .message.user .bubble {
      background: var(--user-bubble);
      border-top-right-radius: 4px;
      color: white;
      box-shadow: 0 2px 12px rgba(109,40,217,0.4);
    }

    /* Typing indicator */
    .typing-indicator {
      display: flex;
      gap: 5px;
      padding: 14px 16px;
      align-items: center;
    }

    .typing-indicator span {
      width: 7px;
      height: 7px;
      background: var(--accent);
      border-radius: 50%;
      display: inline-block;
      animation: bounce 1.2s infinite ease-in-out;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
      40% { transform: scale(1.1); opacity: 1; }
    }

    /* Input area */
    .input-area {
      padding: 16px 24px 20px;
      border-top: 1px solid var(--border);
      backdrop-filter: blur(12px);
      background: rgba(13,13,26,0.7);
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #input {
      flex: 1;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 16px;
      color: var(--text);
      font-family: inherit;
      font-size: 14.5px;
      resize: none;
      outline: none;
      max-height: 120px;
      line-height: 1.5;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #input::placeholder { color: var(--text-muted); }

    #input:focus {
      border-color: rgba(192,132,252,0.4);
      box-shadow: 0 0 0 3px rgba(192,132,252,0.08);
    }

    #send-btn {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, #7c3aed, #9333ea);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      box-shadow: 0 2px 12px rgba(109,40,217,0.5);
    }

    #send-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(109,40,217,0.6);
    }

    #send-btn:active:not(:disabled) { transform: scale(0.95); }

    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    #send-btn svg {
      width: 18px;
      height: 18px;
      fill: white;
    }

    .hint {
      font-size: 11.5px;
      color: var(--text-muted);
      text-align: center;
      margin-top: 8px;
    }

    /* Italic/em in messages */
    .bubble em {
      color: var(--accent2);
      font-style: italic;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <div class="avatar-wrap">
        <div class="avatar">🌸</div>
        <div class="online-dot"></div>
      </div>
      <div class="header-info">
        <h1>Yuki</h1>
        <p>Your companion — <span>online</span></p>
      </div>
    </header>

    <div id="messages">
      <div class="welcome" id="welcome">
        <span class="welcome-emoji">✨</span>
        <h2>Hiii, I'm Yuki~</h2>
        <p>I'm so glad you're here! Talk to me about anything —<br />your day, your thoughts, your dreams... I'm all ears.</p>
        <div class="welcome-chips">
          <button class="chip" onclick="sendChip(this)">How's your day going?</button>
          <button class="chip" onclick="sendChip(this)">Tell me about yourself</button>
          <button class="chip" onclick="sendChip(this)">What do you love?</button>
          <button class="chip" onclick="sendChip(this)">I'm feeling a bit down...</button>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-row">
        <textarea id="input" rows="1" placeholder="Say something to Yuki..." maxlength="1000"></textarea>
        <button id="send-btn" onclick="sendMessage()" aria-label="Send">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>
      <p class="hint">Press <kbd>Enter</kbd> to send · <kbd>Shift+Enter</kbd> for new line</p>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send-btn');
    const welcome = document.getElementById('welcome');

    const history = [];
    let isStreaming = false;

    // Auto-resize textarea
    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
    });

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (!isStreaming) sendMessage();
      }
    });

    function sendChip(btn) {
      inputEl.value = btn.textContent;
      sendMessage();
    }

    function appendMessage(role, content) {
      const div = document.createElement('div');
      div.className = `message ${role}`;

      const avatarDiv = document.createElement('div');
      avatarDiv.className = 'msg-avatar';
      avatarDiv.textContent = role === 'yuki' ? '🌸' : '🫧';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      setContent(bubble, content);

      div.appendChild(avatarDiv);
      div.appendChild(bubble);
      messagesEl.appendChild(div);
      scrollDown();
      return bubble;
    }

    function setContent(el, text) {
      // Render *text* as <em> for italic actions
      el.innerHTML = text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\*(.*?)\*/g, '<em>$1</em>')
        .replace(/\n/g, '<br>');
    }

    function addTypingIndicator() {
      const div = document.createElement('div');
      div.className = 'message yuki';
      div.id = 'typing';

      const avatarDiv = document.createElement('div');
      avatarDiv.className = 'msg-avatar';
      avatarDiv.textContent = '🌸';

      const bubble = document.createElement('div');
      bubble.className = 'bubble typing-indicator';
      bubble.innerHTML = '<span></span><span></span><span></span>';

      div.appendChild(avatarDiv);
      div.appendChild(bubble);
      messagesEl.appendChild(div);
      scrollDown();
      return div;
    }

    function scrollDown() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || isStreaming) return;

      welcome?.remove();

      inputEl.value = '';
      inputEl.style.height = 'auto';
      isStreaming = true;
      sendBtn.disabled = true;

      history.push({ role: 'user', content: text });
      appendMessage('user', text);

      const typingEl = addTypingIndicator();

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: history }),
        });

        typingEl.remove();

        if (!res.ok) throw new Error('Server error');

        const bubble = appendMessage('yuki', '');
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let accumulated = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          const chunk = decoder.decode(value, { stream: true });
          const lines = chunk.split('\n');

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const data = line.slice(6);
            if (data === '[DONE]') break;
            try {
              const parsed = JSON.parse(data);
              if (parsed.error) {
                accumulated = parsed.error;
              } else if (parsed.content) {
                accumulated += parsed.content;
              }
              setContent(bubble, accumulated);
              scrollDown();
            } catch {}
          }
        }

        history.push({ role: 'assistant', content: accumulated });
      } catch (err) {
        typingEl?.remove();
        appendMessage('yuki', '*sighs softly* Something went wrong on my end... Can you try again?');
      }

      isStreaming = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }
  </script>
</body>
</html>
